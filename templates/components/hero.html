<header id="hero" class="relative min-h-screen flex items-center pt-20 pb-16 md:pt-28 md:pb-24 px-6 overflow-hidden">
  <!-- Decorative blobs -->
  <div class="absolute top-32 -right-20 w-80 h-80 blob opacity-10 animate-float" style="background-color: var(--primary);"></div>
  <div class="absolute bottom-20 -left-16 w-64 h-64 blob opacity-8 animate-float-delayed" style="background-color: var(--accent);"></div>
  <div class="absolute top-1/3 left-1/4 w-40 h-40 blob opacity-6 animate-float-slow" style="background-color: var(--gold);"></div>

  <!-- Wildflower dots -->
  <div class="absolute bottom-0 left-0 right-0 h-32 wildflower-dots opacity-40"></div>

  <div class="max-w-6xl mx-auto relative w-full">
    <div class="grid md:grid-cols-2 gap-8 md:gap-16 items-center">
      <div class="fade-up order-2 md:order-1">
        <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full mb-5" style="background-color: {{ site.colors.primary }}22; color: var(--primary);">
          <span class="text-xs font-semibold tracking-widest uppercase font-body">{{ hero.badge }}</span>
        </div>

        <p class="font-hand text-3xl md:text-4xl mb-2" style="color: var(--accent);">{{ hero.greeting }}</p>
        <h1 class="font-heading text-4xl md:text-6xl lg:text-7xl leading-tight mb-5" style="color: var(--text-dark);">{{ hero.title }}</h1>
        <p class="text-base md:text-lg leading-relaxed mb-8 max-w-xl" style="color: var(--text-mid);">{{ hero.subtitle }}</p>

        <!-- Social links -->
        <div class="flex gap-3 mb-8">
          <a href="{{ site.contact.facebook }}" target="_blank" rel="noopener noreferrer" class="w-10 h-10 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110" style="background-color: {{ site.colors.primary }}22; color: var(--primary);" aria-label="Facebook">
            <i data-lucide="facebook" style="width:18px;height:18px;"></i>
          </a>
          <a href="{{ site.contact.instagram }}" target="_blank" rel="noopener noreferrer" class="w-10 h-10 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110" style="background-color: {{ site.colors.accent }}22; color: var(--accent);" aria-label="Instagram">
            <i data-lucide="instagram" style="width:18px;height:18px;"></i>
          </a>
        </div>

        <div class="flex flex-wrap gap-4">
          <a href="{{ hero.cta_primary.href }}" class="inline-flex items-center gap-2 px-7 py-3.5 rounded-full font-semibold font-body transition-all duration-300 hover:scale-105 hover:shadow-lg" style="background-color: var(--accent); color: white;">
            {{ hero.cta_primary.label }} <i data-lucide="arrow-right" style="width:18px;height:18px;"></i>
          </a>
          <a href="{{ hero.cta_secondary.href }}" class="inline-flex items-center gap-2 px-7 py-3.5 rounded-full font-semibold font-body border-2 transition-all duration-300 hover:scale-105" style="border-color: var(--accent); color: var(--accent);">
            {{ hero.cta_secondary.label }}
          </a>
        </div>

        <!-- Awards -->
        <div class="flex flex-wrap gap-3 mt-10">
          {% for award in hero.awards %}
          <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs" style="background-color: {{ site.colors.primary }}11; color: var(--text-mid);">
            <i data-lucide="award" style="width:12px;height:12px;color:var(--gold);"></i>
            {{ award }}
          </div>
          {% endfor %}
        </div>
      </div>

      <div class="order-1 md:order-2 relative">
        <div class="relative photo-stack">
          <!-- Main photo with polaroid effect -->
          <div class="polaroid rounded-sm shadow-xl animate-float-slow" style="transform: rotate(2deg);">
            <div class="aspect-[4/5] overflow-hidden">
              <img src="{{ site.images.hero_photo }}" alt="Hannah Photography" loading="lazy" class="w-full h-full object-cover">
            </div>
          </div>
        </div>

        <!-- Decorative tape -->
        <div class="tape hidden md:block"></div>
      </div>
    </div>
  </div>
</header>
