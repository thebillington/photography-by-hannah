<nav class="fixed top-0 left-0 right-0 z-50 transition-all duration-300" style="background-color: {{ site.colors.background }}E6; backdrop-filter: blur(16px);">
  <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
    <a href="#hero" class="font-hand text-2xl" style="color: var(--text-dark);">{{ site.brand }}</a>
    <div class="hidden md:flex items-center gap-8">
      {% for item in nav.links %}
      <a href="{{ item.href }}" class="nav-link text-sm font-medium font-body tracking-wide" style="color: var(--text-mid);">{{ item.label }}</a>
      {% endfor %}
      <a href="#contact" class="px-6 py-2.5 rounded-full text-sm font-semibold font-body transition-all duration-300 hover:scale-105" style="background-color: var(--accent); color: white;">Get in Touch</a>
    </div>
    <button id="mobile-toggle" class="md:hidden p-2 rounded-lg" style="color: var(--text-dark);" aria-label="Toggle menu">
      <i data-lucide="menu" style="width:26px;height:26px;"></i>
    </button>
  </div>
  <div id="mobile-menu" class="hidden md:hidden px-6 pb-4" style="background-color: {{ site.colors.background }}F2; backdrop-filter: blur(16px);">
    <div class="flex flex-col gap-3 pt-2 border-t" style="border-color: {{ site.colors.accent_light }};">
      {% for item in nav.links %}
      <a href="{{ item.href }}" class="text-sm font-medium py-2 font-body" style="color: var(--text-mid);">{{ item.label }}</a>
      {% endfor %}
      <a href="#contact" class="text-sm font-semibold py-2" style="color: var(--accent);">Get in Touch</a>
    </div>
  </div>
</nav>
