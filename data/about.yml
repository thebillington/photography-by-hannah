section_label: My Story
title: Meet the Photographer

intro: >-
  I'm Hannah - a part-time wedding and family photographer based in Broughton,
  North Lincolnshire. I cover the local area and am always happy to travel for weddings.

paragraphs:
  - >-
    I have always enjoyed taking photos, and after having my daughter Poppy in 2018
    I decided to turn it into a proper business. Photography fits around family life
    and lets me do something I genuinely enjoy. I keep things simple - no fussy
    posing, just natural shots that capture people as they are. I pay attention to
    the details that matter and take pride in delivering photos people actually want
    to look at.
  - >-
    It has grown steadily over the years into a warm, accessible business with over
    200 five-star reviews and a community of families and couples who trust me with
    their most precious days.
  - >-
    I've been honoured to win Wedding Photographer of the Year (Northern England)
    via Lux Life Magazine, rated Top 3 Photographer in North Lincolnshire, and
    received an AFNS Award in May 2021. But what means most is knowing my couples
    and families love their photos.
  - >-
    I'd love to hear from you. Whether you're planning a wedding near or far,
    hoping to book a family session, or just want to say hello - my inbox is always open.

cta_label: Say Hello
cta_href: "#contact"
